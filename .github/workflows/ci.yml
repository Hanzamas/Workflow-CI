name: CI - Train Rice Classification Model

on:
  push:
    branches: [main]
    paths:
      - "MLProject/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  train-model:
    name: Train Model with MLflow Project
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode (termasuk data_split hasil preprocessing K1)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # 3. Install dependensi
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 tensorflow==2.18.0 numpy pandas pillow scikit-learn

      # 4. Verifikasi data_split dari preprocessing K1
      - name: Verify Preprocessed Dataset
        run: |
          echo "Memverifikasi dataset hasil preprocessing K1..."
          ls MLProject/data_split/
          echo "Train:"
          ls MLProject/data_split/train/ | head -5
          echo "Val:"
          ls MLProject/data_split/val/ | head -5

      # 5. Jalankan MLflow Project dengan dataset hasil preprocessing K1
      - name: Run MLflow Project
        run: |
          mlflow run MLProject/ \
            -e main \
            --env-manager local \
            -P data_path=data_split \
            -P epochs=2

      # 6. Upload model artifact
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rice-model-artifact
          path: rice_model_ci.keras
          retention-days: 30
